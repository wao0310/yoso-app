<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>予想アシスタント</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c; --cyan: #2ab8d8; --cream: #f5f0e8;
    --dark: #080c10; --green: #1a4a1a; --blue: #0a2a4a; --red: #8b1a1a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); color: var(--cream); font-family: 'Noto Serif JP', serif; min-height: 100vh; }

  /* ===== TOP SCREEN ===== */
  #topScreen {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 50% 40%, #0d1f0d 0%, #080c10 60%);
    position: relative; overflow: hidden;
  }
  #topScreen::before {
    content: ''; position: absolute; inset: 0;
    background-image: repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(255,255,255,.015) 40px,rgba(255,255,255,.015) 41px),
      repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(255,255,255,.015) 40px,rgba(255,255,255,.015) 41px);
  }
  .top-title { font-family:'Bebas Neue',sans-serif; font-size:4rem; letter-spacing:12px; text-align:center; margin-bottom:8px; background:linear-gradient(135deg,var(--gold),var(--cyan)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; position:relative; }
  .top-sub { font-size:.75rem; letter-spacing:6px; color:rgba(245,240,232,.4); text-align:center; margin-bottom:60px; position:relative; }
  .select-label { font-size:.7rem; letter-spacing:4px; color:rgba(245,240,232,.4); text-align:center; margin-bottom:25px; position:relative; }

  .mode-cards { display:flex; gap:30px; position:relative; }
  .mode-card {
    width:220px; padding:40px 30px; border-radius:8px; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:15px;
    transition:all .3s; position:relative; overflow:hidden;
    border:1px solid rgba(255,255,255,.08);
  }
  .mode-card:hover { transform:translateY(-8px); }
  .mode-card.keiba {
    background:linear-gradient(160deg,rgba(26,74,26,.6) 0%,rgba(10,30,10,.8) 100%);
    border-color:rgba(201,168,76,.3);
  }
  .mode-card.keiba:hover { box-shadow:0 20px 60px rgba(201,168,76,.25); border-color:var(--gold); }
  .mode-card.kyotei {
    background:linear-gradient(160deg,rgba(10,42,74,.6) 0%,rgba(5,15,30,.8) 100%);
    border-color:rgba(42,184,216,.3);
  }
  .mode-card.kyotei:hover { box-shadow:0 20px 60px rgba(42,184,216,.25); border-color:var(--cyan); }
  .mode-icon { font-size:3.5rem; filter:drop-shadow(0 0 20px rgba(255,255,255,.2)); }
  .mode-name { font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:6px; }
  .mode-card.keiba .mode-name { color:var(--gold); }
  .mode-card.kyotei .mode-name { color:var(--cyan); }
  .mode-desc { font-size:.72rem; letter-spacing:2px; opacity:.5; text-align:center; line-height:1.8; }

  /* ===== APP SCREEN ===== */
  #appScreen { display:none; min-height:100vh; }
  #appScreen.show { display:block; animation:fadeIn .5s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  .app-header { padding:12px 20px; text-align:center; border-bottom:3px solid; }
  .app-header.keiba { background:linear-gradient(135deg,var(--green),#0d2b0d); border-color:var(--gold); }
  .app-header.kyotei { background:linear-gradient(135deg,var(--blue),#051525); border-color:var(--cyan); }
  .header-inner { display:flex; flex-direction:column; align-items:center; gap:3px; }
  .back-btn {
    display:block; margin:0 auto 8px auto;
    background:none; border:1px solid rgba(255,255,255,.2); color:rgba(245,240,232,.6);
    padding:6px 16px; border-radius:3px; cursor:pointer; font-family:'Noto Serif JP',serif;
    font-size:.72rem; letter-spacing:2px; transition:all .2s;
  }
  .back-btn:hover { border-color:rgba(255,255,255,.5); color:var(--cream); }
  .app-header h1 { font-family:'Bebas Neue',sans-serif; font-size:2.2rem; letter-spacing:8px; }
  .app-header.keiba h1 { color:var(--gold); text-shadow:0 0 20px rgba(201,168,76,.4); }
  .app-header.kyotei h1 { color:var(--cyan); text-shadow:0 0 20px rgba(42,184,216,.4); }
  .header-sub { font-size:.7rem; letter-spacing:3px; opacity:.5; }
  @media(max-width:480px) {
    .app-header h1 { font-size:1.6rem; letter-spacing:4px; }
  }

  .container { max-width:960px; margin:0 auto; padding:25px 20px; }
  .card { border-radius:6px; padding:25px; margin-bottom:22px; }
  .card.keiba { background:rgba(26,74,26,.15); border:1px solid rgba(201,168,76,.3); }
  .card.kyotei { background:rgba(10,42,74,.2); border:1px solid rgba(42,184,216,.3); }
  .card-dark { background:rgba(0,0,0,.3); border-radius:6px; padding:25px; margin-bottom:22px; }
  .card-dark.keiba { border:1px solid rgba(201,168,76,.2); }
  .card-dark.kyotei { border:1px solid rgba(42,184,216,.2); }

  .section-title { font-size:.72rem; letter-spacing:4px; margin-bottom:15px; text-transform:uppercase; padding-left:10px; }
  .section-title.keiba { color:var(--gold); border-left:3px solid var(--gold); }
  .section-title.kyotei { color:var(--cyan); border-left:3px solid var(--cyan); }

  .grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; margin-bottom:14px; }
  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
  label { display:block; font-size:.68rem; letter-spacing:2px; color:rgba(245,240,232,.45); margin-bottom:5px; }
  input, select { width:100%; background:rgba(0,0,0,.4); border-radius:3px; color:var(--cream); padding:9px 11px; font-family:'Noto Serif JP',serif; font-size:.88rem; transition:border-color .2s; outline:none; }
  input.keiba, select.keiba { border:1px solid rgba(201,168,76,.3); }
  input.keiba:focus, select.keiba:focus { border-color:var(--gold); box-shadow:0 0 10px rgba(201,168,76,.15); }
  input.kyotei, select.kyotei { border:1px solid rgba(42,184,216,.3); }
  input.kyotei:focus, select.kyotei:focus { border-color:var(--cyan); box-shadow:0 0 10px rgba(42,184,216,.15); }
  select option { background:#0a1020; }

  /* エントリー行 */
  .horse-entry { display:grid; grid-template-columns:40px 1fr 1fr 1fr 80px 28px 28px; gap:7px; align-items:center; margin-bottom:9px; padding:9px; background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.05); border-radius:3px; animation:slideIn .3s ease; }
  .racer-entry { display:grid; grid-template-columns:46px 1fr 1fr 80px 80px 80px 28px; gap:7px; align-items:center; margin-bottom:9px; padding:9px; background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.05); border-radius:3px; }
  @keyframes slideIn { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }
  .horse-num { background:var(--red); color:white; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.82rem; flex-shrink:0; }
  .lane-badge { width:34px; height:34px; border-radius:4px; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:.95rem; flex-shrink:0; }
  .lane-1{background:#fff;color:#111} .lane-2{background:#1a1aaa;color:#fff} .lane-3{background:#cc0000;color:#fff}
  .lane-4{background:#888;color:#fff} .lane-5{background:#e8e800;color:#111} .lane-6{background:#008800;color:#fff}
  .remove-btn { background:none; border:1px solid rgba(139,26,26,.5); color:rgba(139,26,26,.6); width:28px; height:28px; border-radius:50%; cursor:pointer; font-size:.95rem; transition:all .2s; }
  .remove-btn:hover { background:var(--red); color:white; border-color:var(--red); }
  .horse-headers, .racer-headers { margin-bottom:7px; padding:0 9px; }
  .horse-headers { display:grid; grid-template-columns:40px 1fr 1fr 1fr 80px 28px 28px; gap:7px; }
  .racer-headers { display:grid; grid-template-columns:46px 1fr 1fr 80px 80px 80px 28px; gap:7px; }
  .horse-headers span, .racer-headers span { font-size:.62rem; letter-spacing:2px; color:rgba(245,240,232,.3); }
  .add-btn { background:none; padding:9px; width:100%; cursor:pointer; border-radius:3px; font-family:'Noto Serif JP',serif; font-size:.82rem; letter-spacing:2px; transition:all .2s; margin-top:9px; }
  .add-btn.keiba { border:1px dashed rgba(201,168,76,.35); color:rgba(201,168,76,.55); }
  .add-btn.keiba:hover { border-color:var(--gold); color:var(--gold); background:rgba(201,168,76,.05); }

  .predict-btn { width:100%; border:none; padding:17px; font-family:'Bebas Neue',sans-serif; font-size:1.45rem; letter-spacing:6px; cursor:pointer; border-radius:3px; transition:all .3s; margin-bottom:22px; }
  .predict-btn.keiba { background:linear-gradient(135deg,var(--gold),#a07830); color:var(--dark); }
  .predict-btn.kyotei { background:linear-gradient(135deg,var(--cyan),#0a7a9a); color:var(--dark); font-weight:900; }
  .predict-btn:hover { transform:translateY(-2px); }
  .predict-btn.keiba:hover { box-shadow:0 8px 30px rgba(201,168,76,.4); }
  .predict-btn.kyotei:hover { box-shadow:0 8px 30px rgba(42,184,216,.4); }
  .predict-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; box-shadow:none; }

  .hidden-section { display:none; }
  .show-section { display:block; animation:fadeIn .4s ease; }

  /* 選手/馬カード */
  .entry-card { background:rgba(0,0,0,.3); border:1px solid rgba(255,255,255,.06); border-radius:4px; padding:14px; margin-bottom:9px; }
  .entry-card-header { display:flex; align-items:center; gap:11px; margin-bottom:7px; }
  .entry-name { font-weight:700; font-size:.97rem; }
  .stars-keiba { color:var(--gold); font-size:1.05rem; letter-spacing:2px; margin-left:auto; }
  .stars-kyotei { color:var(--cyan); font-size:1.05rem; letter-spacing:2px; margin-left:auto; }
  .entry-comment { font-size:.83rem; line-height:1.85; color:rgba(245,240,232,.78); }
  .main-prediction { white-space:pre-wrap; line-height:2.1; font-size:.93rem; }
  .loading { text-align:center; letter-spacing:4px; font-size:.83rem; padding:20px; }
  .loading.keiba { color:var(--gold); }
  .loading.kyotei { color:var(--cyan); }

  /* 記録 */
  .record-area { border-radius:6px; padding:22px; margin-bottom:22px; }
  .record-area.keiba { background:rgba(0,0,0,.3); border:1px solid rgba(201,168,76,.3); }
  .record-area.kyotei { background:rgba(0,0,0,.3); border:1px solid rgba(42,184,216,.3); }
  .rec-btn-hit { border:none; padding:11px; font-family:'Noto Serif JP',serif; font-size:.88rem; letter-spacing:2px; cursor:pointer; border-radius:3px; transition:all .2s; width:100%; }
  .rec-btn-hit.keiba { background:linear-gradient(135deg,#2a6a2a,#1a4a1a); color:var(--cream); border:1px solid var(--gold); }
  .rec-btn-hit.kyotei { background:linear-gradient(135deg,#0a4a6a,#0a2a4a); color:var(--cream); border:1px solid var(--cyan); }
  .rec-btn-miss { background:linear-gradient(135deg,var(--red),#5a0f0f); color:var(--cream); border:1px solid #8b1a1a; padding:11px; font-family:'Noto Serif JP',serif; font-size:.88rem; letter-spacing:2px; cursor:pointer; border-radius:3px; transition:all .2s; width:100%; }
  .rec-btn-hit:hover, .rec-btn-miss:hover { opacity:.85; transform:translateY(-1px); }

  /* タブ */
  .tabs { display:flex; gap:4px; margin-bottom:22px; }
  .tabs.keiba { border-bottom:1px solid rgba(201,168,76,.2); }
  .tabs.kyotei { border-bottom:1px solid rgba(42,184,216,.2); }
  .tab-btn { background:none; border:none; color:rgba(245,240,232,.38); padding:11px 18px; font-family:'Noto Serif JP',serif; font-size:.82rem; letter-spacing:2px; cursor:pointer; border-bottom:2px solid transparent; transition:all .2s; }
  .tab-btn.keiba.active { color:var(--gold); border-bottom-color:var(--gold); }
  .tab-btn.kyotei.active { color:var(--cyan); border-bottom-color:var(--cyan); }
  .tab-content { display:none; }
  .tab-content.active { display:block; }

  /* 統計 */
  .stats-bar { display:grid; grid-template-columns:repeat(4,1fr); gap:13px; margin-bottom:22px; }
  .stat-card { border-radius:4px; padding:14px; text-align:center; }
  .stat-card.keiba { background:rgba(26,74,26,.2); border:1px solid rgba(201,168,76,.2); }
  .stat-card.kyotei { background:rgba(10,42,74,.2); border:1px solid rgba(42,184,216,.2); }
  .stat-num { font-family:'Bebas Neue',sans-serif; font-size:1.9rem; line-height:1; }
  .stat-num.keiba { color:var(--gold); }
  .stat-num.kyotei { color:var(--cyan); }
  .stat-label { font-size:.6rem; letter-spacing:2px; color:rgba(245,240,232,.38); margin-top:4px; }
  .chart-wrap { background:rgba(0,0,0,.3); border-radius:4px; padding:14px; margin-bottom:18px; }
  canvas { width:100% !important; }

  /* 履歴 */
  .history-item { background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.06); border-radius:3px; padding:14px; display:grid; grid-template-columns:1fr auto; gap:9px; align-items:center; margin-bottom:7px; }
  .history-item.hit.keiba { border-left:3px solid var(--gold); }
  .history-item.hit.kyotei { border-left:3px solid var(--cyan); }
  .history-item.miss { border-left:3px solid var(--red); }
  .history-race { font-size:.88rem; font-weight:700; }
  .history-detail { font-size:.72rem; color:rgba(245,240,232,.48); margin-top:3px; line-height:1.65; }
  .badge { padding:3px 11px; border-radius:20px; font-size:.67rem; letter-spacing:2px; font-weight:700; }
  .badge-hit-keiba { background:rgba(201,168,76,.13); color:var(--gold); border:1px solid var(--gold); }
  .badge-hit-kyotei { background:rgba(42,184,216,.13); color:var(--cyan); border:1px solid var(--cyan); }
  .badge-miss { background:rgba(139,26,26,.13); color:#d44; border:1px solid #8b1a1a; }
  .history-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:13px; }
  .clear-btn { background:none; border:1px solid rgba(139,26,26,.3); color:rgba(139,26,26,.45); padding:5px 12px; border-radius:3px; cursor:pointer; font-size:.67rem; letter-spacing:1px; transition:all .2s; }
  .clear-btn:hover { border-color:var(--red); color:var(--red); }
  .no-history { text-align:center; color:rgba(245,240,232,.28); font-size:.82rem; letter-spacing:2px; padding:28px; }

  /* 個別画像読み取り */
  .entry-img-btn { background:none; border:1px solid rgba(255,255,255,.15); color:rgba(245,240,232,.5); width:28px; height:28px; border-radius:3px; cursor:pointer; font-size:.8rem; transition:all .2s; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .entry-img-btn:hover { border-color:rgba(255,255,255,.5); color:var(--cream); background:rgba(255,255,255,.05); }
  .entry-img-btn.reading { animation:pulse .8s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .entry-img-input { display:none; }
  .entry-img-status { font-size:.68rem; letter-spacing:1px; padding:3px 8px; border-radius:3px; margin-top:4px; display:none; }
  .entry-img-status.ok { color:#4caf50; background:rgba(76,175,80,.1); border:1px solid rgba(76,175,80,.25); display:block; }
  .entry-img-status.err { color:#d44; background:rgba(212,68,68,.1); border:1px solid rgba(212,68,68,.25); display:block; }

  /* 過去実績バッジ */
  .past-results-badge { background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.07); border-top:none; border-radius:0 0 3px 3px; padding:6px 10px 6px 52px; font-size:.75rem; color:rgba(245,240,232,.55); line-height:1.6; margin-bottom:9px; margin-top:-9px; }
  .past-label { display:inline-block; font-size:.6rem; letter-spacing:2px; padding:2px 7px; border-radius:10px; margin-right:8px; font-weight:700; }
  .keiba .past-label, .keiba-border .past-label { background:rgba(201,168,76,.15); color:var(--gold); border:1px solid rgba(201,168,76,.3); }
  .kyotei .past-label, .kyotei-border .past-label { background:rgba(42,184,216,.15); color:var(--cyan); border:1px solid rgba(42,184,216,.3); }
  .past-results-badge .past-label { background:rgba(201,168,76,.15); color:var(--gold); border:1px solid rgba(201,168,76,.3); }

  /* 画像サムネイル */
  .img-thumbnail-list { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:12px; }
  .img-thumb-item { position:relative; width:100px; height:80px; flex-shrink:0; }
  .img-thumb-item img { width:100%; height:100%; object-fit:cover; border-radius:4px; border:1px solid rgba(255,255,255,.15); display:block; }
  .img-thumb-remove { position:absolute; top:-6px; right:-6px; width:20px; height:20px; background:var(--red); color:white; border:none; border-radius:50%; cursor:pointer; font-size:.75rem; line-height:20px; text-align:center; transition:all .2s; padding:0; }
  .img-thumb-remove:hover { background:#c0392b; transform:scale(1.15); }
  .img-thumb-label { position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,.6); color:rgba(245,240,232,.7); font-size:.6rem; text-align:center; padding:2px; border-radius:0 0 4px 4px; letter-spacing:1px; }

  /* 画像読み取り */
  .image-upload-area { border:2px dashed rgba(255,255,255,.15); border-radius:6px; padding:30px; text-align:center; cursor:pointer; transition:all .2s; }
  .image-upload-area:hover { border-color:rgba(255,255,255,.35); background:rgba(255,255,255,.02); }
  .image-upload-area.keiba-border:hover { border-color:var(--gold); }
  .image-upload-area.kyotei-border:hover { border-color:var(--cyan); }
  .upload-icon { font-size:2.2rem; margin-bottom:10px; }
  .upload-text { font-size:.88rem; letter-spacing:2px; margin-bottom:6px; }
  .upload-sub { font-size:.7rem; color:rgba(245,240,232,.4); letter-spacing:1px; }
  .ocr-btn { width:100%; margin-top:14px; padding:13px; border:none; border-radius:4px; font-family:'Noto Serif JP',serif; font-size:.9rem; letter-spacing:3px; cursor:pointer; transition:all .2s; font-weight:700; }
  .ocr-btn.keiba { background:linear-gradient(135deg,var(--gold),#a07830); color:var(--dark); }
  .ocr-btn.kyotei { background:linear-gradient(135deg,var(--cyan),#0a7a9a); color:var(--dark); }
  .ocr-btn:hover { opacity:.85; transform:translateY(-1px); }
  .ocr-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
  .ocr-status { padding:14px; border-radius:4px; font-size:.83rem; letter-spacing:2px; text-align:center; }
  .ocr-status.loading { color:var(--gold); }
  .ocr-status.loading.kyotei { color:var(--cyan); }
  .ocr-status.success { color:#4caf50; background:rgba(76,175,80,.1); border:1px solid rgba(76,175,80,.3); }
  .ocr-status.error { color:#d44; background:rgba(212,68,68,.1); border:1px solid rgba(212,68,68,.3); }

  .wave-bar { height:3px; background:linear-gradient(90deg,transparent,var(--cyan),transparent); background-size:200% 100%; animation:wave 2s linear infinite; margin-bottom:22px; border-radius:2px; }
  @keyframes wave { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  @media(max-width:640px){
    .mode-cards{flex-direction:column;gap:16px}
    .mode-card{width:100%;flex-direction:row;padding:22px}
    .top-title{font-size:2.5rem}
    .grid-3,.stats-bar{grid-template-columns:1fr 1fr}
    .horse-entry{grid-template-columns:36px 1fr 68px 28px}
    .racer-entry{grid-template-columns:42px 1fr 72px 32px}
  }
</style>
</head>
<body>

<!-- ===== TOP SCREEN ===== -->
<div id="topScreen">
  <div class="top-title">YOSO AI</div>
  <div class="top-sub">予想アシスタント — AI POWERED</div>
  <div class="select-label">カテゴリを選択してください</div>
  <div class="mode-cards">
    <div class="mode-card keiba" onclick="enterMode('keiba')">
      <div class="mode-icon">🏇</div>
      <div class="mode-name">競馬</div>
      <div class="mode-desc">JRA・地方競馬<br>各馬見解 / 収支管理</div>
    </div>
    <div class="mode-card kyotei" onclick="enterMode('kyotei')">
      <div class="mode-icon">🚤</div>
      <div class="mode-name">競艇</div>
      <div class="mode-desc">全国24場対応<br>各選手見解 / 収支管理</div>
    </div>
  </div>
</div>

<!-- ===== APP SCREEN ===== -->
<div id="appScreen">
  <div class="app-header" id="appHeader">
    <div class="header-inner">
      <button class="back-btn" onclick="goBack()">← メインメニューに戻る</button>
      <h1 id="appTitle"></h1>
      <div class="header-sub" id="appSub"></div>
    </div>
  </div>

  <div class="container">
    <div class="tabs" id="mainTabs">
      <button class="tab-btn" id="tabPredict" onclick="switchTab('predict')">予想する</button>

<script>
let mode = '';
let horseCount = 0;
let lastRaceInfo = {};

const LANE_COLORS = ['','lane-1','lane-2','lane-3','lane-4','lane-5','lane-6'];
const LANE_LABELS = ['','１','２','３','４','５','６'];

  ['statTotal','statHit','statRate','statBalance'].forEach(id => document.getElementById(id).className = 'stat-num ' + c);
  ['raceInfoTitle','entryTitle','analysisTitle','predTitle','recordTitle','chartTitle','histTitle'].forEach(id => document.getElementById(id).className = 'section-title ' + c);

  // predict btn

  if (isK) buildKeibaForm(); else buildKyoteiForm();

function goBack() {
  document.getElementById('appScreen').className = '';
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('topScreen').style.display = 'flex';
  mode = '';
}

function switchTab(name) {
  ['predict','history'].forEach(n => {
    document.getElementById('tab-'+n).classList.toggle('active', n===name);
    const btn = document.getElementById('tab'+(n==='predict'?'Predict':'History'));
    btn.classList.toggle('active', n===name);
  });
  if (name==='history') { renderHistory(); renderChart(); }
}

// ===== 画像読み取り =====
let uploadedImages = []; // {base64, dataUrl, name}
let pastResultsData = [];

function handleImageUpload(event) {
  const files = Array.from(event.target.files);
  files.forEach(file => addImageFile(file));
  event.target.value = '';
}

function addImageFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const mediaType = (file.type === 'image/png') ? 'image/png'
      : (file.type === 'image/gif') ? 'image/gif'
      : (file.type === 'image/webp') ? 'image/webp'
      : 'image/jpeg';
    uploadedImages.push({ base64: e.target.result.split(',')[1], dataUrl: e.target.result, name: file.name, mediaType });
    renderThumbnails();
  };
  reader.readAsDataURL(file);
}

function removeImage(idx) {
  uploadedImages.splice(idx, 1);
  renderThumbnails();
}

function renderThumbnails() {
  const wrap = document.getElementById('imagePreviewWrap');
  const list = document.getElementById('imageThumbnails');
  const btn = document.getElementById('ocrBtn');
  if (uploadedImages.length === 0) {
    wrap.style.display = 'none';
    document.getElementById('ocrStatus').style.display = 'none';
    return;
  }
  wrap.style.display = 'block';
  btn.className = 'ocr-btn ' + mode;
  btn.textContent = `🔍 ${uploadedImages.length}枚の画像からデータを読み取る`;
  list.innerHTML = uploadedImages.map((img, i) => `
    <div class="img-thumb-item">
      <img src="${img.dataUrl}" alt="${img.name}">
      <button class="img-thumb-remove" onclick="removeImage(${i})">×</button>
      <div class="img-thumb-label">${i+1}枚目</div>
    </div>`).join('');
}

// ドラッグ&ドロップ対応
document.addEventListener('DOMContentLoaded', () => {
  const area = document.getElementById('imageUploadArea');
  if (!area) return;
  area.addEventListener('dragover', e => { e.preventDefault(); area.style.borderColor = 'rgba(255,255,255,.5)'; });
  area.addEventListener('dragleave', () => { area.style.borderColor = ''; });
  area.addEventListener('drop', e => {
    e.preventDefault(); area.style.borderColor = '';
    Array.from(e.dataTransfer.files).forEach(f => addImageFile(f));
  });
});

async function readImage() {
  if (uploadedImages.length === 0) { alert('画像を選択してください'); return; }
  const btn = document.getElementById('ocrBtn');
  btn.disabled = true; btn.textContent = '読み取り中...';
  const status = document.getElementById('ocrStatus');
  status.style.display = 'block';
  status.className = 'ocr-status loading' + (mode === 'kyotei' ? ' kyotei' : '');
  status.textContent = mode === 'keiba' ? `🏇　${uploadedImages.length}枚の出馬表を解析中です　🏇` : `🚤　${uploadedImages.length}枚の番組表を解析中です　🚤`;

  const isK = mode === 'keiba';
  const prompt = isK
    ? `競馬の出馬表画像です。出走馬全頭の情報をJSON配列で返してください。前後の説明文は不要です。
[{"num":1,"name":"馬名","jockey":"騎手名","prev":"前走着順","odds":"オッズ数値のみ","recentResults":"近走成績（例:1着・3着・2着）なければ空文字"},...]`
    : `競艇の番組表画像です。出走選手全員の情報をJSON配列で返してください。前後の説明文は不要です。
[{"lane":1,"name":"選手名","id":"登録番号","motor":"モーター2連率の数値のみ","rate":"選手全国勝率の数値のみ","fl":"F回数L回数（例:F0L0）","recentResults":"直近成績（例:1着・3着・2着）なければ空文字"},...]`;

  try {
    // 複数画像をcontentに含める
    const imageContents = uploadedImages.map(img => ({
      type: 'image',
      source: { type: 'base64', media_type: img.mediaType || 'image/jpeg', data: img.base64 }
    }));
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        messages: [{
          role: 'user',
          content: [
            ...imageContents,
            { type: 'text', text: prompt }
          ]
        }]
      })
    });
    const data = await response.json();
    const raw = (data.content || []).map(c => c.text || '').join('');
    const parsed = safeParseJSON(raw);

    pastResultsData = parsed;

    if (isK) {
      document.getElementById('entryList').innerHTML = '';
      horseCount = 0;
      parsed.forEach(h => {
        addHorse();
        const entry = document.getElementById(`horse-${horseCount}`);
        entry.querySelector('.horse-name').value = h.name || '';
        entry.querySelector('.horse-jockey').value = h.jockey || '';
        entry.querySelector('.horse-prev').value = h.prev || '';
        entry.querySelector('.horse-odds').value = h.odds || '';
        // 過去実績がある場合は入力欄の下に表示
        if (h.recentResults) {
          const badge = document.createElement('div');
          badge.className = 'past-results-badge';
          badge.innerHTML = `<span class="past-label">近走</span>${h.recentResults}`;
          entry.after(badge);
        }
      });
    } else {
      parsed.forEach(r => {
        const entry = document.getElementById(`racer-${r.lane}`);
        if (!entry) return;
        entry.querySelector('.racer-name').value = r.name || '';
        entry.querySelector('.racer-id').value = r.id || '';
        entry.querySelector('.racer-motor').value = r.motor || '';
        entry.querySelector('.racer-rate').value = r.rate || '';
        entry.querySelector('.racer-fl').value = r.fl || '';
        // 過去実績表示
        const existing = entry.nextElementSibling;
        if (existing && existing.classList.contains('past-results-badge')) existing.remove();
        if (r.recentResults) {
          const badge = document.createElement('div');
          badge.className = 'past-results-badge';
          badge.innerHTML = `<span class="past-label">直近</span>${r.recentResults}`;
          entry.after(badge);
        }
      });
    }

    const hasResults = parsed.some(p => p.recentResults);
    status.className = 'ocr-status success';
    status.textContent = `✅ ${parsed.length}頭/名のデータを読み取りました！${hasResults ? '過去実績も予想に反映されます。' : ''}内容を確認してから予想してください。`;
  } catch (e) {
    status.className = 'ocr-status error';
    status.textContent = '❌ 読み取りに失敗しました。画像を変えて再試行してください。';
  }
  btn.disabled = false;
  btn.textContent = '🔍 画像からデータを読み取る';
}

// ===== JSONパース（柔軟版）=====
function safeParseJSON(raw) {
  // バッククォート・マークダウン除去
  let s = raw.replace(/```json|```/g, '').trim();
  // 先頭の { or [ を探して切り出し
  const objStart = s.indexOf('{');
  const arrStart = s.indexOf('[');
  if (objStart === -1 && arrStart === -1) throw new Error('No JSON found');
  const start = (objStart !== -1 && (arrStart === -1 || objStart < arrStart)) ? objStart : arrStart;
  // 末尾の } or ] を探して切り出し
  const lastObj = s.lastIndexOf('}');
  const lastArr = s.lastIndexOf(']');
  const end = Math.max(lastObj, lastArr);
  if (end === -1) throw new Error('No JSON end');
  s = s.slice(start, end + 1);
  return JSON.parse(s);
}

// ===== 各エントリー個別画像読み取り =====

// ファイルの実際のMIMEタイプを取得するヘルパー
function getMediaType(file) {
  const t = file.type;
  if (t === 'image/png') return 'image/png';
  if (t === 'image/gif') return 'image/gif';
  if (t === 'image/webp') return 'image/webp';
  return 'image/jpeg'; // jpg・heic・その他はjpegとして扱う
}

// 複数ファイルをbase64に変換
function filesToBase64(files) {
  return Promise.all(Array.from(files).map(file => new Promise(res => {
    const reader = new FileReader();
    reader.onload = e => res({ base64: e.target.result.split(',')[1], mediaType: getMediaType(file) });
    reader.readAsDataURL(file);
  })));
}

function triggerEntryImg(id, type) {
  const inputId = type === 'horse' ? `entry-img-input-h${id}` : `entry-img-input-r${id}`;
  document.getElementById(inputId).click();
}

async function readEntryImage(event, id, type) {
  const files = event.target.files;
  if (!files || files.length === 0) return;
  event.target.value = '';

  const entryEl = document.getElementById(type === 'horse' ? `horse-${id}` : `racer-${id}`);
  if (!entryEl) return;
  const imgBtn = entryEl.querySelector('.entry-img-btn');
  imgBtn.classList.add('reading');
  imgBtn.textContent = '⏳';

  const images = await filesToBase64(files);

  const isHorse = type === 'horse';
  const prompt = isHorse
    ? `競馬の出馬表または馬の詳細情報画像です。以下のキーを持つJSONオブジェクトを1つだけ返してください。前後の説明文は不要です。
{"name":"馬名","jockey":"騎手名","prev":"前走着順（例:1着）","odds":"オッズ数値のみ（なければ空）","recentResults":"近走成績を簡潔に（例:3着・1着・2着）、なければ空文字"}`
    : `競艇の番組表または選手詳細情報画像です。以下のキーを持つJSONオブジェクトを1つだけ返してください。前後の説明文は不要です。
{"name":"選手名","id":"登録番号","motor":"モーター2連率の数値のみ","rate":"選手全国勝率の数値のみ","fl":"F回数とL回数（例:F0L0）","recentResults":"今節または直近の成績を簡潔に（例:3着・1着・4着）、なければ空文字"}`;

  try {
    const imageContents = images.map(img => ({
      type: 'image',
      source: { type: 'base64', media_type: img.mediaType, data: img.base64 }
    }));

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 600,
        messages: [{ role: 'user', content: [
          ...imageContents,
          { type: 'text', text: prompt }
        ]}]
      })
    });
    const data = await response.json();
    const raw = (data.content || []).map(c => c.text || '').join('');
    const parsed = safeParseJSON(raw);

    if (isHorse) {
      if (parsed.name) entryEl.querySelector('.horse-name').value = parsed.name;
      if (parsed.jockey) entryEl.querySelector('.horse-jockey').value = parsed.jockey;
      if (parsed.prev) entryEl.querySelector('.horse-prev').value = parsed.prev;
      if (parsed.odds) entryEl.querySelector('.horse-odds').value = parsed.odds;
    } else {
      if (parsed.name) entryEl.querySelector('.racer-name').value = parsed.name;
      if (parsed.id) entryEl.querySelector('.racer-id').value = parsed.id;
      if (parsed.motor) entryEl.querySelector('.racer-motor').value = parsed.motor;
      if (parsed.rate) entryEl.querySelector('.racer-rate').value = parsed.rate;
      if (parsed.fl) entryEl.querySelector('.racer-fl').value = parsed.fl;
    }

    // 過去実績バッジ更新
    const existing = entryEl.nextElementSibling;
    if (existing && existing.classList.contains('past-results-badge')) existing.remove();
    if (parsed.recentResults) {
      const badge = document.createElement('div');
      badge.className = 'past-results-badge';
      const label = isHorse ? '近走' : '直近';
      badge.innerHTML = `<span class="past-label">${label}</span>${parsed.recentResults}`;
      entryEl.after(badge);
      const key = isHorse ? 'name' : 'lane';
      const val = isHorse ? parsed.name : id;
      const idx = pastResultsData.findIndex(p => p[key] === val);
      if (idx >= 0) pastResultsData[idx].recentResults = parsed.recentResults;
      else pastResultsData.push({ [key]: val, recentResults: parsed.recentResults });
    }

    imgBtn.classList.remove('reading');
    imgBtn.textContent = '✅';
    setTimeout(() => { imgBtn.textContent = '📷'; }, 2500);
  } catch(e) {
    imgBtn.classList.remove('reading');
    imgBtn.textContent = '❌';
    setTimeout(() => { imgBtn.textContent = '📷'; }, 2500);
  }
}

}

// ===== 予想実行 =====
async function predict() {
  const btn = document.getElementById('predictBtn');
  const isK = mode === 'keiba';

  let racerText = '', raceInfo = '';

  if (isK) {
    const raceName = document.getElementById('raceName').value;
    const raceCourse = document.getElementById('raceCourse').value;
    const distance = document.getElementById('distance').value;
    const trackCondition = document.getElementById('trackCondition').value;
    const courseType = document.getElementById('courseType').value;
    const raceClass = document.getElementById('raceClass').value;
    const horses = [];
    document.querySelectorAll('.horse-entry').forEach((el,i)=>{
      const name=el.querySelector('.horse-name').value;
      if(name) {
        const past = pastResultsData.find(p => p.name === name);
        horses.push({num:i+1,name,jockey:el.querySelector('.horse-jockey').value,prev:el.querySelector('.horse-prev').value,odds:el.querySelector('.horse-odds').value,recentResults:past?.recentResults||''});
      }
    });
    if(horses.length<2){alert('馬を2頭以上入力してください');return;}
    lastRaceInfo = {raceName,raceCourse,distance,date:new Date().toLocaleDateString('ja-JP')};
    raceInfo = `レース名:${raceName||'不明'} / 競馬場:${raceCourse||'不明'} / 距離:${distance||'不明'} / コース:${courseType||'不明'} / 馬場:${trackCondition||'不明'} / クラス:${raceClass||'不明'}`;
    racerText = horses.map(h=>`${h.num}番 ${h.name}（騎手:${h.jockey||'不明'}、前走:${h.prev||'不明'}、オッズ:${h.odds?h.odds+'倍':'不明'}${h.recentResults?'、近走成績:'+h.recentResults:''}）`).join('\n');
  } else {
    const stadium=document.getElementById('stadium').value;
    const raceNum=document.getElementById('raceNum').value;
    const grade=document.getElementById('grade').value;
    const weather=document.getElementById('weather').value;
    const wind=document.getElementById('wind').value;
    const waterCondition=document.getElementById('waterCondition').value;
    const racers=[];
    for(let i=1;i<=6;i++){
      const el=document.getElementById(`racer-${i}`);
      const name=el.querySelector('.racer-name').value;
      if(name) {
        const past = pastResultsData.find(p => p.lane === i);
        racers.push({lane:i,name,id:el.querySelector('.racer-id').value,motor:el.querySelector('.racer-motor').value,rate:el.querySelector('.racer-rate').value,fl:el.querySelector('.racer-fl').value,recentResults:past?.recentResults||''});
      }
    }
    if(racers.length<2){alert('選手を2名以上入力してください');return;}
    lastRaceInfo={stadium,raceNum,date:new Date().toLocaleDateString('ja-JP')};
    raceInfo=`競艇場:${stadium||'不明'} / ${raceNum||'不明'} / グレード:${grade||'不明'} / 天候:${weather||'不明'} / 風:${wind||'不明'} / 水面:${waterCondition||'不明'}`;
    racerText=racers.map(r=>`${r.lane}枠 ${r.name}（登録:${r.id||'不明'}、モーター勝率:${r.motor||'不明'}%、選手勝率:${r.rate||'不明'}、F/L:${r.fl||'不明'}${r.recentResults?'、直近成績:'+r.recentResults:''}）`).join('\n');
  }

  btn.disabled=true;
  document.getElementById('analysisSection').className='show-section';
  document.getElementById('predictionSection').className='hidden-section';
  const loadClass = 'loading ' + mode;
  document.getElementById('entryAnalysis').innerHTML=`<div class="${loadClass}">${isK?'🏇':'🚤'}　分析中です　${isK?'🏇':'🚤'}</div>`;

  const prompt1 = isK
    ? `競馬予想専門家として各馬の短評をJSONで返してください。\n【レース】${raceInfo}\n【出走馬】\n${racerText}\n\n形式:[{"num":1,"name":"馬名","rating":4,"comment":"150字程度の短評"},...]\nratingは1〜5整数。JSONのみ。`
    : `競艇予想専門家として各選手の短評をJSONで返してください。\n【レース】${raceInfo}\n【選手】\n${racerText}\n\n形式:[{"lane":1,"name":"選手名","rating":4,"comment":"コース有利不利・モーター・実力・FL含む150字程度の短評"},...]\nratingは1〜5整数。JSONのみ。`;

  const prompt2 = isK
    ? `競馬予想専門家として日本語で予想レポートを作成してください。\n【レース】${raceInfo}\n【出走馬】\n${racerText}\n\n1.レース傾向分析 2.注目馬ランキング(1〜3位) 3.穴馬候補 4.買い目提案(単勝・馬連・三連複) 5.総評\n※参考予想です。馬券購入は自己責任でお願いします。`
    : `競艇予想専門家として日本語で予想レポートを作成してください。\n【レース】${raceInfo}\n【選手】\n${racerText}\n\n1.レース傾向分析(コース特性・天候・水面) 2.注目選手ランキング(1〜3位) 3.進入予想 4.穴選手候補 5.買い目提案(3連単・3連複・2連単) 6.総評\n※参考予想です。舟券購入は自己責任でお願いします。`;

  try {
    const [res1,res2]=await Promise.all([
      fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt1}]})}),
      fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt2}]})})
    ]);
    const [d1,d2]=await Promise.all([res1.json(),res2.json()]);
    const raw=(d1.content||[]).map(c=>c.text||'').join('');
    try {
      const analyses=safeParseJSON(raw);
      const starsClass = isK ? 'stars-keiba' : 'stars-kyotei';
      document.getElementById('entryAnalysis').innerHTML=analyses.map(a=>`
        <div class="entry-card">
          <div class="entry-card-header">
            ${isK ? `<div class="horse-num">${a.num}</div>` : `<div class="lane-badge ${LANE_COLORS[a.lane]}">${LANE_LABELS[a.lane]}</div>`}
            <div class="entry-name">${a.name}</div>
            <div class="${starsClass}">${'★'.repeat(a.rating)}${'☆'.repeat(5-a.rating)}</div>
          </div>
          <div class="entry-comment">${a.comment}</div>
        </div>`).join('');
    } catch {
      document.getElementById('entryAnalysis').innerHTML='<div style="color:rgba(245,240,232,.5);font-size:.83rem;">見解を取得できませんでした</div>';
    }
    const pred=(d2.content||[]).map(c=>c.text||'').join('');
    document.getElementById('mainPrediction').textContent=pred;
    document.getElementById('predictionSection').className='show-section';
  } catch(e) {
    document.getElementById('entryAnalysis').innerHTML='<div style="color:#d44">エラーが発生しました</div>';
  }
  btn.disabled=false;
  btn.textContent=mode==='keiba'?'🏇 予想を出す':'🚤 予想を出す';
}

// ===== 記録 =====
function saveResult(isHit){
  const r1=document.getElementById('result1st').value;
  const r2=document.getElementById('result2nd').value;
  const r3=document.getElementById('result3rd').value;
  const betMemo=document.getElementById('betMemo').value;
  const payout=parseInt(document.getElementById('payout').value)||0;
  const betAmount=parseInt(document.getElementById('betAmount').value)||0;
  const profit=isHit?(payout-betAmount):-betAmount;
  const label=mode==='keiba'?(lastRaceInfo.raceName||'不明レース')+(lastRaceInfo.raceCourse?'（'+lastRaceInfo.raceCourse+'）':''):(lastRaceInfo.stadium||'不明')+(lastRaceInfo.raceNum?' '+lastRaceInfo.raceNum:'');
  const record={id:Date.now(),mode,date:lastRaceInfo.date||new Date().toLocaleDateString('ja-JP'),label,result:[r1,r2,r3].filter(Boolean).join(' → '),betMemo,payout,betAmount,profit,hit:isHit};
  const history=getHistory();history.unshift(record);
  sessionStorage.setItem('yosoHistory',JSON.stringify(history));
  ['result1st','result2nd','result3rd','betMemo','payout','betAmount'].forEach(id=>document.getElementById(id).value='');
  renderHistory();renderChart();
  alert(isHit?`🏆 的中！収支: ${profit>=0?'+':''}${profit.toLocaleString()}円`:`記録しました。収支: ${profit.toLocaleString()}円`);
}

function getHistory(){try{return JSON.parse(sessionStorage.getItem('yosoHistory')||'[]').filter(h=>h.mode===mode);}catch{return[];}}
function getAllHistory(){try{return JSON.parse(sessionStorage.getItem('yosoHistory')||'[]');}catch{return[];}}

function clearHistory(){
  if(!confirm('この種目の履歴を消去しますか？'))return;
  const all=getAllHistory().filter(h=>h.mode!==mode);
  sessionStorage.setItem('yosoHistory',JSON.stringify(all));
  renderHistory();renderChart();
}

function renderHistory(){
  const history=getHistory();
  const total=history.length,hits=history.filter(h=>h.hit).length;
  const balance=history.reduce((s,h)=>s+(h.profit||0),0);
  const rate=total>0?Math.round(hits/total*100)+'%':'―';
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statHit').textContent=hits;
  document.getElementById('statRate').textContent=rate;
  const balEl=document.getElementById('statBalance');
  balEl.textContent=total>0?(balance>=0?'+':'')+balance.toLocaleString():'―';
  const col=mode==='keiba'?'var(--gold)':'var(--cyan)';
  balEl.style.color=balance>=0?col:'#d44';
  const isK=mode==='keiba';
  const list=document.getElementById('historyList');
  if(total===0){list.innerHTML='<div class="no-history">まだ記録がありません</div>';return;}
  list.innerHTML=history.map(h=>`
    <div class="history-item ${h.hit?'hit':'miss'} ${h.hit?mode:''}">
      <div>
        <div class="history-race">${h.label}</div>
        <div class="history-detail">
          ${h.date}　${h.result?'着順: '+h.result:''}
          ${h.betMemo?'<br>📝 '+h.betMemo:''}
          ${h.betAmount?'<br>賭け金: '+h.betAmount.toLocaleString()+'円'+(h.hit&&h.payout?' → 払戻: '+h.payout.toLocaleString()+'円　収支: '+(h.profit>=0?'+':'')+h.profit.toLocaleString()+'円':'　収支: '+h.profit.toLocaleString()+'円'):''}
        </div>
      </div>
      <span class="badge ${h.hit?(isK?'badge-hit-keiba':'badge-hit-kyotei'):'badge-miss'}">${h.hit?'的中':'ハズレ'}</span>
    </div>`).join('');
}

function renderChart(){
  const history=getHistory().slice().reverse();
  const canvas=document.getElementById('balanceChart');
  const ctx=canvas.getContext('2d');
  const W=canvas.offsetWidth||800,H=120;
  canvas.width=W;canvas.height=H;ctx.clearRect(0,0,W,H);
  if(history.length===0){ctx.fillStyle='rgba(245,240,232,.2)';ctx.font='14px serif';ctx.textAlign='center';ctx.fillText('記録がありません',W/2,60);return;}
  let cum=0;
  const data=history.map(h=>{cum+=(h.profit||0);return cum;});
  const max=Math.max(...data,1),min=Math.min(...data,-1),range=max-min||1;
  const padL=50,padR=20,padT=15,padB=25,cW=W-padL-padR,cH=H-padT-padB;
  const zeroY=padT+cH*(max/range);
  ctx.strokeStyle='rgba(245,240,232,.1)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(padL,zeroY);ctx.lineTo(W-padR,zeroY);ctx.stroke();
  const lineCol=data[data.length-1]>=0?(mode==='keiba'?'#c9a84c':'#2ab8d8'):'#d44';
  ctx.strokeStyle=lineCol;ctx.lineWidth=2;ctx.beginPath();
  data.forEach((v,i)=>{const x=padL+(i/(data.length-1||1))*cW,y=padT+(1-(v-min)/range)*cH;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.stroke();
  data.forEach((v,i)=>{
    const x=padL+(i/(data.length-1||1))*cW,y=padT+(1-(v-min)/range)*cH;
    ctx.fillStyle=v>=0?lineCol:'#d44';ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();
  });
  ctx.fillStyle='rgba(245,240,232,.4)';ctx.font='10px serif';ctx.textAlign='right';
  ctx.fillText((max>=0?'+':'')+Math.round(max).toLocaleString(),padL-4,padT+5);
  ctx.fillText((min>=0?'+':'')+Math.round(min).toLocaleString(),padL-4,H-padB+10);
}
